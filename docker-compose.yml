version: "3.8"

services:
  mcp-elabftw:
    build:
      context: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ELABFTW_BASE_URL=https://elab.example.com
      - ELABFTW_API_KEY=3-<rest of your key>
      - MCP_MODE=hosted
      - MCP_PORT=8000
      - MCP_HOST=0.0.0.0

